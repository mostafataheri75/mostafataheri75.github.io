# Hugo Site Configuration
baseURL = "https://mostafataheri75.github.io/"
languageCode = "en-us"
title = "Mostafa Taheri"
theme = "careercanvas"
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false

[languages]
  [languages.en]
    contentDir = "content/en"
    languageName = "English"
    weight = 1
    [languages.en.params]
      tagline = "Problem Solver. AI Researcher. Maker."
      hero_description = "Quantum Information PhD candidate and AI Researcher with 10 years of experience in computational science. Currently pioneering LLM-powered mathematical reasoning and high-throughput AI pipelines at Inria and ENS de Lyon."
      hero_location = "Lyon, France"
      resume_url = "/files/Mostafa_Taheri_CV_English_version.pdf"
      collab_tags = [
        "LLM Engineering & vLLM",
        "Graph Neural Networks",
        "Quantum Information Theory",
        "Algorithmic Optimization",
        "High-Performance Computing"
      ]

[build]
  writeStats = true

[params]
